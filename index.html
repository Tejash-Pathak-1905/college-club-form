<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Club Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <header class="page-header">
      <h1>College Club Registration</h1>
      <p class="page-subtitle">Fill in the details below to register your club. All fields marked with <span class="required-star">*</span> are required.</p>
    </header>

    <div id="success-banner" class="banner banner--success" hidden>
      <span class="banner-icon">✓</span>
      <span id="success-message">Registration submitted successfully!</span>
    </div>

    <div id="error-banner" class="banner banner--error" hidden>
      <span class="banner-icon">!</span>
      <span id="error-message">Submission failed. Please try again.</span>
    </div>

    <form id="registrationForm" novalidate>

      <!-- Section 1: Club Details -->
      <section class="form-section">
        <h2 class="section-title">🏫 Club Details</h2>

        <div class="field-group">
          <label for="clubName">Club Name <span class="required-star">*</span></label>
          <input
            type="text"
            id="clubName"
            name="clubName"
            placeholder="e.g. IEEE Student Branch"
            maxlength="100"
          />
          <span class="error-msg" id="clubName-error"></span>
        </div>
      </section>

      <!-- Section 2: President / POC Details -->
      <section class="form-section">
        <h2 class="section-title">👤 President / POC Details</h2>

        <div class="field-group">
          <label for="presidentDesignation">Designation <span class="required-star">*</span></label>
          <select id="presidentDesignation" name="presidentDesignation">
            <option value="President">President</option>
            <option value="POC">POC (Point of Contact)</option>
          </select>
          <span class="error-msg" id="presidentDesignation-error"></span>
        </div>

        <div class="field-group">
          <label for="presidentFullName">Full Name <span class="required-star">*</span></label>
          <input
            type="text"
            id="presidentFullName"
            name="presidentFullName"
            placeholder="e.g. Arjun Sharma"
            maxlength="100"
            autocomplete="name"
          />
          <span class="error-msg" id="presidentFullName-error"></span>
        </div>

        <div class="field-group">
          <label for="presidentUSN">USN (University Serial Number) <span class="required-star">*</span></label>
          <input
            type="text"
            id="presidentUSN"
            name="presidentUSN"
            placeholder="e.g. 1RV21CS001"
            maxlength="10"
            style="text-transform: uppercase;"
          />
          <span class="error-msg" id="presidentUSN-error"></span>
        </div>

        <div class="field-group">
          <label for="presidentPhone">Phone Number <span class="required-star">*</span></label>
          <input
            type="tel"
            id="presidentPhone"
            name="presidentPhone"
            placeholder="e.g. 9876543210"
            maxlength="10"
            autocomplete="tel"
          />
          <span class="error-msg" id="presidentPhone-error"></span>
        </div>

        <div class="field-group">
          <label for="presidentEmail">Email Address <span class="required-star">*</span></label>
          <input
            type="email"
            id="presidentEmail"
            name="presidentEmail"
            placeholder="e.g. arjun@rvce.edu.in"
            autocomplete="email"
          />
          <span class="error-msg" id="presidentEmail-error"></span>
        </div>
      </section>

      <!-- Section 3: Vice President Details -->
      <section class="form-section">
        <h2 class="section-title">👥 Vice President Details</h2>

        <div class="field-group">
          <label for="vpDesignation">Designation <span class="required-star">*</span></label>
          <select id="vpDesignation" name="vpDesignation">
            <option value="Vice President">Vice President</option>
            <option value="POC">POC (Point of Contact)</option>
          </select>
          <span class="error-msg" id="vpDesignation-error"></span>
        </div>

        <div class="field-group">
          <label for="vpFullName">Full Name <span class="required-star">*</span></label>
          <input
            type="text"
            id="vpFullName"
            name="vpFullName"
            placeholder="e.g. Priya Nair"
            maxlength="100"
            autocomplete="name"
          />
          <span class="error-msg" id="vpFullName-error"></span>
        </div>

        <div class="field-group">
          <label for="vpUSN">USN (University Serial Number) <span class="required-star">*</span></label>
          <input
            type="text"
            id="vpUSN"
            name="vpUSN"
            placeholder="e.g. 1RV21CS078"
            maxlength="10"
            style="text-transform: uppercase;"
          />
          <span class="error-msg" id="vpUSN-error"></span>
        </div>

        <div class="field-group">
          <label for="vpPhone">Phone Number <span class="required-star">*</span></label>
          <input
            type="tel"
            id="vpPhone"
            name="vpPhone"
            placeholder="e.g. 9123456780"
            maxlength="10"
            autocomplete="tel"
          />
          <span class="error-msg" id="vpPhone-error"></span>
        </div>

        <div class="field-group">
          <label for="vpEmail">Email Address <span class="required-star">*</span></label>
          <input
            type="email"
            id="vpEmail"
            name="vpEmail"
            placeholder="e.g. priya@rvce.edu.in"
            autocomplete="email"
          />
          <span class="error-msg" id="vpEmail-error"></span>
        </div>
      </section>

      <!-- Section 4: Additional Details -->
      <section class="form-section">
        <h2 class="section-title">📝 Additional Details</h2>

        <div class="field-group">
          <label for="additionalDetails">Any additional information <span class="optional-tag">(optional)</span></label>
          <textarea
            id="additionalDetails"
            name="additionalDetails"
            rows="4"
            placeholder="e.g. Meeting schedule, club achievements, special requirements, etc."
            maxlength="500"
          ></textarea>
          <span class="char-count" id="additionalDetails-count">0 / 500</span>
          <span class="error-msg" id="additionalDetails-error"></span>
        </div>
      </section>

      <!-- Submit -->
      <div class="submit-area">
        <button type="submit" id="submitBtn" class="btn-submit">
          Submit Registration
        </button>
      </div>

    </form>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
